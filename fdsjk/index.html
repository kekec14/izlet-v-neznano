<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uganka</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0c0c0a;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: #c9a84c;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1.5rem;
    width: 100%;
    max-width: 520px;
  }

  /* Page header (unified across pages) */
  .page-header {
    text-align: center;
    width: 100%;
    margin-bottom: 2.5rem;
  }
  .page-header-label {
    font-size: 11px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #c9a84c;
    opacity: 0.8;
    margin-bottom: 10px;
  }
  .page-header h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 1px;
    color: #e4d5a0;
    margin-bottom: 0.3rem;
  }
  .page-header-line {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #c9a84c, transparent);
    margin: 0.8rem auto 0;
  }

  /* Page footer (unified across pages) */
  .page-footer {
    margin-top: 48px;
    padding-top: 20px;
    text-align: center;
    font-size: 11px;
    color: #c9a84c;
    opacity: 0.5;
    letter-spacing: 5px;
    text-transform: uppercase;
    border-top: 1px solid rgba(201,168,76,0.15);
    width: 100%;
  }

  /* Logo - hidden by default */
  .logo-frame {
    width: 200px;
    height: 200px;
    display: none;
    align-items: center;
    justify-content: center;
    margin-bottom: 2rem;
    animation: fadeIn 0.8s ease-out;
  }

  .logo-frame.visible {
    display: flex;
  }

  /* Letter boxes */
  .letters {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }

  .letters input {
    width: 38px;
    height: 48px;
    text-align: center;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.5rem;
    font-weight: 400;
    color: #c9a84c;
    background: transparent;
    border: none;
    border-bottom: 2px solid rgba(201,168,76,0.4);
    outline: none;
    text-transform: uppercase;
    caret-color: #c9a84c;
    transition: border-color 0.3s;
  }

  .letters input:focus {
    border-bottom-color: #c9a84c;
  }

  .letters input.correct {
    border-bottom-color: #4a9e6a;
    color: #4a9e6a;
  }

  /* Tagline - hidden by default */
  .tagline {
    display: none;
    font-weight: 300;
    font-size: 0.85rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #b8a472;
    margin-bottom: 2.5rem;
    animation: fadeIn 0.8s ease-out;
  }

  .tagline.visible {
    display: block;
  }

  /* Hint */
  .hint {
    max-width: 440px;
    text-align: center;
    font-style: italic;
    font-weight: 300;
    font-size: 1.2rem;
    line-height: 1.9;
    color: #b8a472;
    margin-bottom: 2.5rem;
  }

  /* Button */
  .btn {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    color: #c9a84c;
    background: none;
    border: 1px solid rgba(201,168,76,0.4);
    padding: 0.7rem 2.5rem;
    border-radius: 2rem;
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0;
    visibility: hidden;
  }

  .btn:hover {
    background: rgba(201,168,76,0.1);
    border-color: #c9a84c;
  }

  .btn.show {
    opacity: 1;
    visibility: visible;
    animation: fadeIn 0.8s ease-out;
  }

  .btn.hidden { display: none; }

  /* Confetti canvas */
  #confetti {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9999;
  }

  /* Coordinates */
  .coords {
    display: none;
    text-align: center;
    margin-bottom: 1.5rem;
    animation: fadeIn 0.8s ease-out;
  }

  .coords.visible { display: block; }

  .coords p {
    font-size: 1.4rem;
    font-weight: 400;
    color: #c9a84c;
    letter-spacing: 0.05em;
  }

  /* Maps link */
  .maps-btn {
    display: none;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    color: #0c0c0a;
    background: #c9a84c;
    border: none;
    padding: 0.8rem 2.5rem;
    border-radius: 2rem;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.3s ease;
    animation: fadeIn 0.8s ease-out;
  }

  .maps-btn.visible { display: inline-block; }

  .maps-btn:hover {
    background: #b8a472;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  @media (max-width: 480px) {
    .letters { gap: 0.3rem; }
    .letters input { width: 30px; height: 40px; font-size: 1.2rem; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <!-- Page header (unified) -->
    <div class="page-header">
      <div class="page-header-label">✦ Izlet v neznano ✦</div>
      <h1>Uganka</h1>
      <div class="page-header-line"></div>
    </div>

    <!-- Logo (hidden until Pomoč click) -->
    <div class="logo-frame">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="180" height="180">
        <circle cx="100" cy="105" r="80" fill="none" stroke="#d6275a" stroke-width="18"/>
        <circle cx="100" cy="45" r="30" fill="#d6275a"/>
      </svg>
    </div>

    <!-- Letter input boxes: B E R R Y S H K A -->
    <div class="letters" id="letters"></div>

    <!-- Tagline (hidden until Pomoč click) -->
    <p class="tagline">The Ultimate Taste Experience</p>

    <!-- Hint (always visible) -->
    <p class="hint">Namig: iščemo skovanko, ki vsebuje besedo za jagodo — v njihovem primeru ima vodilno vlogo brinova jagoda.</p>

    <!-- Button (appears after 30s) -->
    <button class="btn" id="helpBtn">Ne znam, pomagaj mi.</button>

    <!-- Button 2 (appears after 2min, reveals B Y K) -->
    <button class="btn" id="helpBtn2" style="margin-top: 0.8rem;">Potrebujem še malo dodatne pomoči.</button>

    <!-- Coordinates (shown on solve) -->
    <div class="coords" id="coords">
      <p>45.74942° N, 15.03619° E</p>
    </div>

    <!-- Google Maps button (shown on solve) -->
    <a class="maps-btn" id="mapsBtn" href="https://www.google.com/maps?q=45.74942072203754,15.036189801476914" target="_blank">📍 Odpri v Google Maps</a>

    <!-- Page footer (unified) -->
    <div class="page-footer">✦ Izlet v neznano ✦</div>
  </div>

  <canvas id="confetti"></canvas>

  <script>
    const ANSWER = 'BERRYSHKA';
    const container = document.getElementById('letters');
    const inputs = [];
    let solved = false;

    // Create input boxes
    for (let i = 0; i < ANSWER.length; i++) {
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.maxLength = 1;
      inp.setAttribute('autocomplete', 'off');
      inp.dataset.index = i;
      container.appendChild(inp);
      inputs.push(inp);
    }

    function checkSolved() {
      if (solved) return;
      const word = inputs.map(inp => inp.value.toUpperCase()).join('');
      if (word === ANSWER) {
        solved = true;
        inputs.forEach(inp => { inp.disabled = true; inp.classList.add('correct'); });
        document.getElementById('coords').classList.add('visible');
        document.getElementById('mapsBtn').classList.add('visible');
        document.getElementById('helpBtn').classList.add('hidden');
        document.getElementById('helpBtn2').classList.add('hidden');
        launchConfetti();
      }
    }

    // Handle typing
    inputs.forEach((inp, i) => {
      inp.addEventListener('input', function() {
        const val = this.value.toUpperCase();
        this.value = val;

        if (val === ANSWER[i]) {
          this.classList.add('correct');
        } else {
          this.classList.remove('correct');
        }

        if (val && i < inputs.length - 1) {
          inputs[i + 1].focus();
        }

        checkSolved();
      });

      inp.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && !this.value && i > 0) {
          inputs[i - 1].focus();
          inputs[i - 1].value = '';
          inputs[i - 1].classList.remove('correct');
        }
      });
    });

    // Help button: show after 30s
    const helpBtn = document.getElementById('helpBtn');
    setTimeout(function() {
      if (!solved) helpBtn.classList.add('show');
    }, 30000);

    // Help button click
    helpBtn.addEventListener('click', function() {
      document.querySelector('.logo-frame').classList.add('visible');
      document.querySelector('.tagline').classList.add('visible');
      this.classList.add('hidden');
    });

    // Help2 button: show after 2 min
    const helpBtn2 = document.getElementById('helpBtn2');
    setTimeout(function() {
      if (!solved) helpBtn2.classList.add('show');
    }, 120000);

    // Help2 button click: reveal B, Y, K at positions 0, 4, 7
    helpBtn2.addEventListener('click', function() {
      const reveals = { 0: 'B', 4: 'Y', 7: 'K' };
      Object.entries(reveals).forEach(([idx, letter]) => {
        const i = parseInt(idx);
        inputs[i].value = letter;
        inputs[i].classList.add('correct');
      });
      this.classList.add('hidden');
      checkSolved();
    });

    // Confetti (unified engine across pages)
    function launchConfetti() {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      // Colors tuned for this page's palette (gold/cream/rose)
      const colors = ['#c9a84c', '#d6275a', '#4a9e6a', '#b8a472', '#e4d5a0', '#ff6b8a', '#ffd700'];
      const particles = [];

      for (let i = 0; i < 180; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height - canvas.height,
          w: Math.random() * 10 + 4,
          h: Math.random() * 6 + 2,
          color: colors[Math.floor(Math.random() * colors.length)],
          vx: (Math.random() - 0.5) * 5,
          vy: Math.random() * 3 + 2,
          rot: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 12,
          opacity: 1,
        });
      }

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;
        particles.forEach(p => {
          if (p.opacity <= 0) return;
          alive = true;
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.06;
          p.rot += p.rotSpeed;
          if (p.y > canvas.height + 30) p.opacity -= 0.015;
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot * Math.PI / 180);
          ctx.globalAlpha = Math.max(0, p.opacity);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
          ctx.restore();
        });
        if (alive) requestAnimationFrame(animate);
      }
      animate();
    }
  </script>
</body>
</html>
