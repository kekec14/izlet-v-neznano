<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Izlet v neznano</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1408">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --gold: #C8A050;
    --gold-light: #F5D680;
    --gold-dark: #8B7340;
    --brown-deep: #1a1408;
    --brown-mid: #2d1f0a;
    --brown-card: rgba(45,31,10,0.92);
    --cream: #F5ECD7;
    --cream-light: #FFF9EE;
    --green: #4ecdc4;
    --red: #ff6b6b;
  }

  body {
    font-family: 'Source Sans 3', -apple-system, sans-serif;
    background: linear-gradient(160deg, var(--brown-deep) 0%, var(--brown-mid) 40%, var(--brown-deep) 100%);
    color: var(--cream);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* Honeycomb background */
  .honeycomb-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; opacity: 0.05; pointer-events: none;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 480px; margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* Header */
  .header { text-align: center; margin-bottom: 20px; }
  .header-label {
    font-size: 11px; letter-spacing: 5px; color: var(--gold);
    text-transform: uppercase; margin-bottom: 4px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 30px; font-weight: 800;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; letter-spacing: 1px;
  }
  .header p { color: var(--gold-dark); font-size: 13px; margin-top: 4px; }

  /* Progress */
  .progress-wrap {
    background: rgba(42,30,10,0.8); border-radius: 20px; height: 7px;
    border: 1px solid #3d2b1f; overflow: hidden; margin-bottom: 6px;
  }
  .progress-bar {
    height: 100%; border-radius: 20px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-text {
    text-align: center; font-size: 11px; color: var(--gold-dark); margin-bottom: 18px;
  }

  /* Coordinate display */
  .coords {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 3px; padding: 12px 6px; align-items: center;
    background: linear-gradient(135deg, var(--cream-light), #F0E4C8);
    border-radius: 12px; border: 1px solid #E0CFA5;
    margin: 0 auto; max-width: 410px;
  }
  .coord-box {
    width: 23px; height: 28px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: #3D2B1F;
    transition: all 0.4s ease;
    border: 1.5px dashed #B8A070;
    background: rgba(255,250,240,0.4);
  }
  .coord-box.filled {
    border: 2px solid var(--gold);
    background: linear-gradient(135deg, var(--cream-light), #F5EBCF);
  }
  .coord-box.just-filled {
    border-color: var(--gold-light);
    background: linear-gradient(135deg, var(--gold-light), #E8C44A);
    transform: scale(1.15);
    box-shadow: 0 0 12px rgba(200,160,80,0.5);
  }
  .coord-sep {
    font-size: 20px; font-weight: bold; color: #3D2B1F;
    margin: 0 1px; line-height: 28px;
  }
  .coord-comma { margin: 0 5px; }

  /* Task card */
  .task-card {
    margin-top: 22px;
    background: var(--brown-card);
    border: 1px solid #4a3520;
    border-radius: 16px; padding: 22px 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
  }
  .task-card.shake {
    animation: shake 0.5s ease;
  }
  .task-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .task-emoji { font-size: 28px; line-height: 1; }
  .task-category {
    font-size: 10px; letter-spacing: 3px; color: var(--gold);
    text-transform: uppercase;
  }
  .task-number { font-size: 11px; color: var(--gold-dark); }
  .task-question {
    font-size: 17px; line-height: 1.5; margin-bottom: 4px;
    font-weight: 500;
  }
  .task-detail {
    font-size: 13px; color: var(--gold-dark); font-style: italic;
    margin-bottom: 16px;
  }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
  .option-btn {
    padding: 14px 18px; border-radius: 12px;
    border: 1.5px solid #4a3520;
    background: rgba(26,20,8,0.6);
    color: var(--cream); font-size: 16px; font-weight: 500;
    cursor: pointer; text-align: left;
    font-family: inherit; transition: all 0.2s ease;
    -webkit-appearance: none;
  }
  .option-btn:active { transform: scale(0.97); }
  .option-btn:hover { border-color: var(--gold-dark); }
  .option-btn.correct {
    border-color: var(--green);
    background: rgba(78,205,196,0.12);
  }
  .option-btn:disabled { cursor: default; opacity: 0.7; }

  /* Input */
  .input-row { display: flex; gap: 10px; margin-top: 14px; }
  .input-field {
    flex: 1; padding: 12px 16px; border-radius: 10px;
    border: 1.5px solid #4a3520; background: var(--brown-deep);
    color: var(--cream); font-size: 18px; font-family: inherit;
    outline: none; -webkit-appearance: none;
  }
  .input-field:focus { border-color: var(--gold); }
  .input-field::placeholder { color: #6B5A32; }
  .submit-btn {
    padding: 12px 20px; border-radius: 10px; border: none;
    background: var(--gold);
    color: var(--brown-deep); font-weight: bold; font-size: 16px;
    cursor: pointer; font-family: inherit; transition: all 0.3s ease;
  }
  .submit-btn:disabled {
    background: #3d2b1f; color: #6B5A32; cursor: default;
  }

  /* Feedback */
  .feedback {
    margin-top: 14px; padding: 10px 16px; border-radius: 10px;
    font-size: 14px; text-align: center; font-weight: 700;
    animation: fadeIn 0.3s ease;
  }
  .feedback.correct {
    background: rgba(78,205,196,0.12); border: 1px solid var(--green); color: var(--green);
  }
  .feedback.wrong {
    background: rgba(255,107,107,0.12); border: 1px solid var(--red); color: var(--red);
  }

  /* Final reveal */
  .reveal { margin-top: 32px; text-align: center; }
  .reveal-step { animation: slideUp 0.6s ease both; }
  .reveal-big-emoji { font-size: 52px; margin-bottom: 8px; }
  .reveal-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 700;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .reveal-subtitle { font-size: 16px; color: var(--gold); margin: 6px 0 4px; }
  .reveal-card {
    background: linear-gradient(135deg, rgba(200,160,80,0.12), var(--brown-card));
    border: 2px solid var(--gold); border-radius: 20px;
    padding: 28px 22px; box-shadow: 0 0 40px rgba(200,160,80,0.15);
    animation: scaleIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .reveal-name {
    font-family: 'Playfair Display', serif;
    font-size: 26px; color: var(--gold-light); font-weight: 700;
    margin: 8px 0 2px;
  }
  .reveal-place { font-size: 17px; color: var(--gold); margin-bottom: 12px; }
  .reveal-address { font-size: 13px; color: var(--gold-dark); line-height: 1.5; margin-bottom: 20px; }
  .maps-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 28px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, var(--gold), #D4B060, #E8C44A);
    color: var(--brown-deep); font-weight: bold; font-size: 16px;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 16px rgba(200,160,80,0.4);
    text-decoration: none;
  }
  .maps-btn:active { transform: scale(0.97); }

  /* Confetti canvas */
  #confetti {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 9999;
  }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }
  
  .hidden { display: none !important; }

  /* Remove number input spinners */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>

<!-- Honeycomb SVG Background -->
<svg class="honeycomb-bg" viewBox="0 0 400 900" preserveAspectRatio="xMidYMid slice">
  <g stroke="#8B6914" fill="none" stroke-width="1">
    <script type="text/javascript">
      // Will be generated by JS
    </script>
  </g>
</svg>

<canvas id="confetti"></canvas>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="header-label">✦ Izlet v neznano ✦</div>
    <h1>Kam gremo?</h1>
    <p>Reši naloge in odkrij cilj potovanja!</p>
  </div>

  <!-- Progress -->
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0 / 15 nalog rešenih</div>

  <!-- Coordinates -->
  <div class="coords" id="coordsDisplay"></div>

  <!-- Task Card -->
  <div class="task-card" id="taskCard">
    <div class="task-header">
      <span class="task-emoji" id="taskEmoji"></span>
      <div>
        <div class="task-category" id="taskCategory"></div>
        <div class="task-number" id="taskNumber"></div>
      </div>
    </div>
    <div class="task-question" id="taskQuestion"></div>
    <div class="task-detail" id="taskDetail"></div>
    <div id="taskInteraction"></div>
    <div id="feedbackArea"></div>
  </div>

  <!-- Final Reveal -->
  <div class="reveal hidden" id="revealArea"></div>
</div>

<script>
// ═══════════════════════════════════════════
//  QUIZ DATA
// ═══════════════════════════════════════════
// Target: 45.95404, 14.744131
// Digit indices: 0=4, 1=5, 2=9, 3=5, 4=4, 5=0, 6=4, 7=1, 8=4, 9=7, 10=4, 11=4, 12=1, 13=3, 14=1

const TARGET = ["4","5","9","5","4","0","4","1","4","7","4","4","1","3","1"];

const TASKS = [
  {
    emoji: "🏙️", category: "ŠTART", type: "input",
    question: "Pot se začne v Kranju. Koliko soglasnikov ima beseda KRANJ?",
    detail: null,
    correctValue: "4", digits: [0],
  },
  {
    emoji: "🔤", category: "ČRKE", type: "input",
    question: "Koliko črk ima beseda KRANJ?",
    detail: null,
    correctValue: "5", digits: [1],
  },
  {
    emoji: "🏛️", category: "GEOGRAFIJA", type: "input",
    question: "Koliko črk ima ime glavnega mesta Slovenije?",
    detail: null,
    correctValue: "9", digits: [2],
  },
  {
    emoji: "🗺️", category: "POTOVANJE", type: "input",
    question: "Koliko črk ima beseda IZLET?",
    detail: null,
    correctValue: "5", digits: [3],
  },
  {
    emoji: "🚗", category: "OPAZOVANJE", type: "choice",
    question: "Koliko koles ima vaš avto?",
    detail: null,
    options: ["3", "4", "6"],
    correct: "4", digits: [4],
  },
  {
    emoji: "🌊", category: "ŠTETJE", type: "input",
    question: "Koliko jezer vidite z avtoceste med Kranjem in Ljubljano?",
    detail: null,
    correctValue: "0", digits: [5],
  },
  {
    emoji: "🛣️", category: "MATEMATIKA", type: "input",
    question: "Oznaka avtoceste, po kateri se peljete, je A2. Koliko je 2 × 2?",
    detail: null,
    correctValue: "4", digits: [6],
  },
  {
    emoji: "🚇", category: "PREDOR", type: "choice",
    question: "Koliko predorov prevozite od Kranja do Ljubljane?",
    detail: null,
    options: ["0", "1", "3"],
    correct: "1", digits: [7],
  },
  {
    emoji: "🪟", category: "OPAZOVANJE", type: "choice",
    question: "Koliko stranskih oken ima vaš avto?",
    detail: null,
    options: ["2", "4", "6"],
    correct: "4", digits: [8],
  },
  {
    emoji: "🌈", category: "SPLOŠNO ZNANJE", type: "choice",
    question: "Koliko barv ima mavrica?",
    detail: null,
    options: ["5", "6", "7"],
    correct: "7", digits: [9],
  },
  {
    emoji: "🍀", category: "NARAVA", type: "choice",
    question: "Koliko letnih časov pozna narava?",
    detail: null,
    options: ["3", "4", "5"],
    correct: "4", digits: [10],
  },
  {
    emoji: "🔢", category: "RAČUNANJE", type: "input",
    question: "Na poti prevozite skupaj 3 predore. Prištej 1.",
    detail: null,
    correctValue: "4", digits: [11],
  },
  {
    emoji: "🌍", category: "SLOVENIJA", type: "choice",
    question: "Na koliko morij ima Slovenija obalo?",
    detail: null,
    options: ["0", "1", "2"],
    correct: "1", digits: [12],
  },
  {
    emoji: "🚦", category: "OPAZOVANJE", type: "choice",
    question: "Koliko barv ima semafor?",
    detail: null,
    options: ["2", "3", "4"],
    correct: "3", digits: [13],
  },
  {
    emoji: "🏁", category: "ZADNJA NALOGA", type: "choice",
    question: "Koliko voznikov ima vaš avto?",
    detail: null,
    options: ["1", "2", "3"],
    correct: "1", digits: [14],
  },
];

// Coordinate template layout
const COORD_LAYOUT = [
  {t:"d",i:0},{t:"d",i:1},{t:"."},
  {t:"d",i:2},{t:"d",i:3},{t:"d",i:4},{t:"d",i:5},{t:"d",i:6},
  {t:","},
  {t:"d",i:7},{t:"d",i:8},{t:"."},
  {t:"d",i:9},{t:"d",i:10},{t:"d",i:11},{t:"d",i:12},{t:"d",i:13},{t:"d",i:14},
];

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let currentTask = 0;
let revealedDigits = Array(15).fill(null);
let feedback = null; // null | "correct" | "wrong"
let isLocked = false;

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function buildCoords() {
  const el = document.getElementById('coordsDisplay');
  el.innerHTML = '';
  COORD_LAYOUT.forEach((item, idx) => {
    if (item.t === '.') {
      const s = document.createElement('span');
      s.className = 'coord-sep';
      s.textContent = '.';
      el.appendChild(s);
    } else if (item.t === ',') {
      const s = document.createElement('span');
      s.className = 'coord-sep coord-comma';
      s.textContent = ',';
      el.appendChild(s);
    } else {
      const d = document.createElement('div');
      d.className = 'coord-box';
      d.id = 'cbox-' + item.i;
      el.appendChild(d);
    }
  });
}

function updateCoords(justFilledDigits) {
  revealedDigits.forEach((val, i) => {
    const box = document.getElementById('cbox-' + i);
    if (!box) return;
    box.textContent = val || '';
    box.className = 'coord-box';
    if (val) {
      box.classList.add('filled');
      if (justFilledDigits && justFilledDigits.includes(i)) {
        box.classList.add('just-filled');
        setTimeout(() => box.classList.remove('just-filled'), 600);
      }
    }
  });
}

function updateProgress() {
  const solved = revealedDigits.filter(d => d !== null).length;
  document.getElementById('progressBar').style.width = (solved / 15 * 100) + '%';
  document.getElementById('progressText').textContent = solved + ' / 15 nalog rešenih';
}

function renderTask() {
  const t = TASKS[currentTask];
  const card = document.getElementById('taskCard');
  card.classList.remove('hidden', 'shake');

  document.getElementById('taskEmoji').textContent = t.emoji;
  document.getElementById('taskCategory').textContent = t.category;
  document.getElementById('taskNumber').textContent = 'Naloga ' + (currentTask + 1) + ' / ' + TASKS.length;
  document.getElementById('taskQuestion').textContent = t.question;

  const detailEl = document.getElementById('taskDetail');
  if (t.detail) {
    detailEl.textContent = t.detail;
    detailEl.classList.remove('hidden');
  } else {
    detailEl.classList.add('hidden');
  }

  const interaction = document.getElementById('taskInteraction');
  interaction.innerHTML = '';
  document.getElementById('feedbackArea').innerHTML = '';

  if (t.type === 'choice') {
    const wrap = document.createElement('div');
    wrap.className = 'options';
    t.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.addEventListener('click', () => handleChoice(opt));
      wrap.appendChild(btn);
    });
    interaction.appendChild(wrap);
  } else {
    const row = document.createElement('div');
    row.className = 'input-row';
    const input = document.createElement('input');
    input.type = 'number';
    input.inputMode = 'numeric';
    input.className = 'input-field';
    input.placeholder = 'Vnesi odgovor...';
    input.id = 'answerInput';
    
    const btn = document.createElement('button');
    btn.className = 'submit-btn';
    btn.textContent = '✓';
    btn.disabled = true;
    btn.id = 'submitBtn';

    input.addEventListener('input', () => {
      btn.disabled = !input.value.trim();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && input.value.trim()) handleInput(input.value.trim());
    });
    btn.addEventListener('click', () => {
      if (input.value.trim()) handleInput(input.value.trim());
    });

    row.appendChild(input);
    row.appendChild(btn);
    interaction.appendChild(row);

    // Auto-focus on mobile-friendly way
    setTimeout(() => input.focus(), 100);
  }
}

// ═══════════════════════════════════════════
//  LOGIC
// ═══════════════════════════════════════════
function handleChoice(value) {
  if (isLocked) return;
  const t = TASKS[currentTask];
  const isCorrect = value === t.correct;
  processAnswer(isCorrect, value, t);
}

function handleInput(value) {
  if (isLocked) return;
  const t = TASKS[currentTask];
  const isCorrect = value === t.correctValue;
  processAnswer(isCorrect, value, t);
}

function processAnswer(isCorrect, value, t) {
  isLocked = true;

  if (isCorrect) {
    // Highlight correct option
    if (t.type === 'choice') {
      document.querySelectorAll('.option-btn').forEach(btn => {
        btn.disabled = true;
        if (btn.textContent === t.correct) btn.classList.add('correct');
      });
    }

    // Reveal digits
    const digitValue = t.correctDigit || t.correct || t.correctValue;
    t.digits.forEach((pos, i) => {
      revealedDigits[pos] = TARGET[pos];
    });
    updateCoords(t.digits);
    updateProgress();
    showFeedback('correct');

    setTimeout(() => {
      isLocked = false;
      if (currentTask < TASKS.length - 1) {
        currentTask++;
        renderTask();
      } else {
        document.getElementById('taskCard').classList.add('hidden');
        startReveal();
      }
    }, 1300);
  } else {
    document.getElementById('taskCard').classList.add('shake');
    showFeedback('wrong');
    setTimeout(() => {
      isLocked = false;
      document.getElementById('taskCard').classList.remove('shake');
      document.getElementById('feedbackArea').innerHTML = '';
    }, 1500);
  }
}

function showFeedback(type) {
  const area = document.getElementById('feedbackArea');
  area.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'feedback ' + type;
  div.textContent = type === 'correct' ? '✓ Pravilno!' : '✗ Napačno, poskusi znova!';
  area.appendChild(div);
}

// ═══════════════════════════════════════════
//  REVEAL
// ═══════════════════════════════════════════
function startReveal() {
  const area = document.getElementById('revealArea');
  area.classList.remove('hidden');

  const steps = [
    { delay: 300, html: `
      <div class="reveal-step" style="animation-delay:0s">
        <div class="reveal-big-emoji">🎉</div>
        <div class="reveal-title">Bravo!</div>
        <p style="color:var(--gold-dark);margin-top:8px;font-size:15px">Vse naloge rešene!</p>
      </div>
    `},
    { delay: 1600, html: `
      <div class="reveal-step" style="animation-delay:0s;margin-top:16px">
        <p style="font-size:17px;color:var(--gold)">Koordinate kažejo na...</p>
      </div>
    `},
    { delay: 3000, html: `
      <div class="reveal-card" style="margin-top:20px">
        <div style="font-size:48px;margin-bottom:8px">🐝🏠</div>
        <div class="reveal-name">VIŠNJA GORA</div>
        <div class="reveal-place">Hiša kranjske čebele</div>
        <div class="reveal-address">
          Mestni trg 2, 1294 Višnja Gora<br>
          Interaktivni muzej · Kavarna · Prenočišča v obliki panja
        </div>
        <a href="https://maps.google.com/?q=45.95404,14.744131" target="_blank" class="maps-btn">
          📍 Odpri v Google Maps
        </a>
      </div>
    `},
  ];

  let accumulated = '';
  steps.forEach(step => {
    setTimeout(() => {
      accumulated += step.html;
      area.innerHTML = accumulated;
      if (step.delay === 3000) launchConfetti();
    }, step.delay);
  });
}

// ═══════════════════════════════════════════
//  CONFETTI
// ═══════════════════════════════════════════
function launchConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#F5A623','#D4A84B','#E8D5A8','#fff','#3D2B1F','#C8A050','#ff6b6b','#4ecdc4','#ffe66d','#F5D680'];
  const particles = [];

  for (let i = 0; i < 180; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height - canvas.height,
      w: Math.random() * 10 + 4,
      h: Math.random() * 6 + 2,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 5,
      vy: Math.random() * 3 + 2,
      rot: Math.random() * 360,
      rotSpeed: (Math.random() - 0.5) * 12,
      opacity: 1,
    });
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    particles.forEach(p => {
      if (p.opacity <= 0) return;
      alive = true;
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.06;
      p.rot += p.rotSpeed;
      if (p.y > canvas.height + 30) p.opacity -= 0.015;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if (alive) requestAnimationFrame(animate);
  }
  animate();
}
