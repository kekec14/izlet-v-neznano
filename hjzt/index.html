<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Izlet v neznano — Sestavljanka</title>
<meta name="theme-color" content="#1a1408">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --gold: #C8A050;
    --gold-light: #F5D680;
    --gold-dark: #8B7340;
    --ember: #D97740;
    --brown-deep: #1a1408;
    --brown-mid: #2d1f0a;
    --brown-card: rgba(45,31,10,0.92);
    --cream: #F5ECD7;
    --cream-light: #FFF9EE;
    --green: #4ecdc4;
  }

  body {
    font-family: 'Source Sans 3', -apple-system, sans-serif;
    background: linear-gradient(160deg, var(--brown-deep) 0%, var(--brown-mid) 40%, var(--brown-deep) 100%);
    color: var(--cream);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* Subtle backdrop pattern — radial warm glow like a lantern */
  .lantern-bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(217,119,64,0.08) 0%, transparent 55%),
      radial-gradient(ellipse at 20% 80%, rgba(200,160,80,0.05) 0%, transparent 50%);
  }

  .container {
    position: relative; z-index: 1;
    max-width: 480px; margin: 0 auto;
    padding: 20px 16px 40px;
  }

  /* Unified header (matches other pages) */
  .header { text-align: center; margin-bottom: 20px; }
  .header-label {
    font-size: 11px; letter-spacing: 5px; color: var(--gold);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px; font-weight: 800;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; letter-spacing: 1px;
  }
  .header p { color: var(--gold-dark); font-size: 13px; margin-top: 8px; }

  /* Task card */
  .task-card {
    background: var(--brown-card);
    border: 1px solid #4a3520;
    border-radius: 16px;
    padding: 22px 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    margin-top: 12px;
  }
  .task-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .task-emoji { font-size: 28px; line-height: 1; }
  .task-category {
    font-size: 10px; letter-spacing: 3px; color: var(--gold);
    text-transform: uppercase;
  }
  .task-sub { font-size: 11px; color: var(--gold-dark); }
  .task-question {
    font-size: 16px; line-height: 1.5; margin-bottom: 6px;
    font-weight: 500; color: var(--cream);
  }
  .task-detail {
    font-size: 13px; color: var(--gold-dark); font-style: italic;
    margin-bottom: 16px;
  }

  /* Progress / moves counter */
  .stats-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--gold-dark);
    margin-bottom: 14px;
    letter-spacing: 0.5px;
  }
  .stats-row strong { color: var(--gold); font-weight: 700; }
  .shuffle-btn {
    background: transparent;
    border: 1px solid rgba(200,160,80,0.35);
    color: var(--gold);
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 11px;
    font-family: inherit;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .shuffle-btn:hover, .shuffle-btn:active {
    background: rgba(200,160,80,0.12);
    border-color: var(--gold);
  }

  /* Help button (appears after 2 min) */
  .help-row {
    display: none;
    text-align: center;
    margin-top: 14px;
    animation: fadeIn 0.8s ease;
  }
  .help-row.show { display: block; }
  .help-btn {
    background: rgba(217,119,64,0.1);
    border: 1px solid rgba(217,119,64,0.4);
    color: var(--ember);
    padding: 10px 22px;
    border-radius: 10px;
    font-size: 13px;
    font-family: inherit;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .help-btn:hover, .help-btn:active {
    background: rgba(217,119,64,0.18);
    border-color: var(--ember);
  }

  /* Puzzle board */
  .board-wrap {
    position: relative;
    width: 100%;
    max-width: 360px;
    margin: 0 auto;
    aspect-ratio: 1 / 1;
    background: rgba(26,20,8,0.8);
    border: 2px solid #4a3520;
    border-radius: 14px;
    padding: 8px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 6px 24px rgba(0,0,0,0.3);
  }
  .board {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 8px;
    overflow: hidden;
    background: rgba(0,0,0,0.4);
  }
  .tile {
    position: absolute;
    width: calc(100% / 3);
    height: calc(100% / 3);
    transition: left 0.25s ease, top 0.25s ease;
    cursor: pointer;
    overflow: hidden;
    border: 1px solid rgba(26,20,8,0.6);
    box-sizing: border-box;
    background-repeat: no-repeat;
    background-size: 300% 300%;
  }
  .tile.empty {
    cursor: default;
    background: transparent;
    border: none;
  }
  .tile.correct {
    filter: brightness(1.08) saturate(1.1);
  }

  /* Solved reveal */
  .reveal {
    margin-top: 28px;
    text-align: center;
    display: none;
  }
  .reveal.show { display: block; animation: fadeIn 0.6s ease; }
  .reveal-step { animation: slideUp 0.6s ease both; }
  .reveal-big-emoji { font-size: 52px; margin-bottom: 8px; }
  .reveal-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 700;
    background: linear-gradient(135deg, var(--gold-light), var(--ember));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .reveal-card {
    background: linear-gradient(135deg, rgba(200,160,80,0.12), var(--brown-card));
    border: 2px solid var(--gold); border-radius: 20px;
    padding: 24px 20px; box-shadow: 0 0 40px rgba(217,119,64,0.2);
    animation: scaleIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    margin-top: 20px;
  }
  .reveal-photo-wrap {
    width: 100%;
    max-width: 320px;
    margin: 0 auto 16px;
    border-radius: 12px;
    overflow: hidden;
    border: 2px solid var(--gold);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    aspect-ratio: 3/2;
    background: #000;
  }
  .reveal-photo {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .reveal-name {
    font-family: 'Playfair Display', serif;
    font-size: 26px; color: var(--gold-light); font-weight: 700;
    margin: 8px 0 2px;
  }
  .reveal-place { font-size: 15px; color: var(--gold); margin-bottom: 4px; }
  .reveal-address { font-size: 13px; color: var(--gold-dark); line-height: 1.5; margin-bottom: 18px; }
  .reveal-quote {
    font-size: 13px; color: var(--cream); font-style: italic;
    line-height: 1.6; margin: 14px 0 18px;
    opacity: 0.85;
  }
  .coords-line {
    font-size: 14px; color: var(--gold); margin-bottom: 14px;
    letter-spacing: 0.5px; font-weight: 600;
  }
  .maps-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 28px; border-radius: 14px; border: none;
    background: linear-gradient(135deg, var(--gold), #D4B060, #E8C44A);
    color: var(--brown-deep); font-weight: bold; font-size: 16px;
    cursor: pointer; font-family: inherit;
    box-shadow: 0 4px 16px rgba(200,160,80,0.4);
    text-decoration: none;
  }
  .maps-btn:active { transform: scale(0.97); }

  /* Confetti canvas (unified) */
  #confetti {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 9999;
  }

  /* Unified footer */
  .page-footer {
    margin-top: 48px;
    padding-top: 20px;
    text-align: center;
    font-size: 11px;
    color: var(--gold);
    opacity: 0.5;
    letter-spacing: 5px;
    text-transform: uppercase;
    border-top: 1px solid rgba(200,160,80,0.15);
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes celebratePulse {
    0%, 100% { box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 6px 24px rgba(0,0,0,0.3); }
    50% { box-shadow: inset 0 0 20px rgba(217,119,64,0.3), 0 6px 40px rgba(217,119,64,0.4); }
  }
  .board-wrap.solved {
    animation: celebratePulse 1.2s ease;
    border-color: var(--ember);
  }

  .hidden { display: none !important; }
</style>
</head>

<script>
(function() {
  const SIZE = 3; // 3x3 grid
  const TOTAL = SIZE * SIZE;
  const EMPTY = TOTAL - 1; // index of the empty tile (last position = 8)
  const board = document.getElementById('board');
  const boardWrap = document.getElementById('boardWrap');
  const movesEl = document.getElementById('moves');
  const shuffleBtn = document.getElementById('shuffleBtn');

  // tiles[i] = which piece index (0..EMPTY) is currently at position i
  // Solved state: tiles[i] = i for all i
  let tiles = [];
  let moves = 0;
  let solved = false;

  // Get the SVG source as a serialized string and convert to data URL
  const svgSource = document.getElementById('puzzleSource');
  // Clone to avoid mutating the source, remove display:none before serializing
  const svgClone = svgSource.cloneNode(true);
  svgClone.removeAttribute('style');
  svgClone.removeAttribute('id');
  svgClone.setAttribute('preserveAspectRatio', 'xMidYMid slice');
  const svgString = new XMLSerializer().serializeToString(svgClone);
  // btoa requires latin1-safe string; SVG uses only ASCII here so it's fine
  const svgDataUrl = 'url("data:image/svg+xml;base64,' + btoa(svgString) + '")';

  function createTiles() {
    board.innerHTML = '';
    for (let i = 0; i < TOTAL; i++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.piece = i; // which piece this tile shows (0..8)

      if (i === EMPTY) {
        tile.classList.add('empty');
      } else {
        // Show only this piece's portion of the SVG by offsetting the background
        const row = Math.floor(i / SIZE);
        const col = i % SIZE;
        // background-position: 0% 0% = top-left piece, 50% 0% = middle-top, 100% 0% = top-right, etc.
        const bgX = (col / (SIZE - 1)) * 100;
        const bgY = (row / (SIZE - 1)) * 100;
        tile.style.backgroundImage = svgDataUrl;
        tile.style.backgroundPosition = bgX + '% ' + bgY + '%';
      }

      tile.addEventListener('click', () => onTileClick(i));
      board.appendChild(tile);
    }
  }

  function positionTiles() {
    // tiles[pos] = piece at position pos
    // Find which DOM tile holds each piece and position it
    const domTiles = Array.from(board.children);
    tiles.forEach((pieceIdx, pos) => {
      const domTile = domTiles.find(el => parseInt(el.dataset.piece) === pieceIdx);
      if (!domTile) return;
      const row = Math.floor(pos / SIZE);
      const col = pos % SIZE;
      domTile.style.left = `${col * 100 / SIZE}%`;
      domTile.style.top = `${row * 100 / SIZE}%`;
      // Mark correctness for subtle visual
      if (pieceIdx === pos && pieceIdx !== EMPTY) {
        domTile.classList.add('correct');
      } else {
        domTile.classList.remove('correct');
      }
    });
  }

  function emptyPosition() {
    return tiles.indexOf(EMPTY);
  }

  function canSwap(pos) {
    const emptyPos = emptyPosition();
    const r1 = Math.floor(pos / SIZE), c1 = pos % SIZE;
    const r2 = Math.floor(emptyPos / SIZE), c2 = emptyPos % SIZE;
    return (r1 === r2 && Math.abs(c1 - c2) === 1) || (c1 === c2 && Math.abs(r1 - r2) === 1);
  }

  function swap(pos) {
    const emptyPos = emptyPosition();
    [tiles[pos], tiles[emptyPos]] = [tiles[emptyPos], tiles[pos]];
  }

  function onTileClick(pieceIdx) {
    if (solved) return;
    // Find the position of the clicked piece
    const pos = tiles.indexOf(pieceIdx);
    if (pieceIdx === EMPTY) return;
    if (!canSwap(pos)) return;

    swap(pos);
    moves++;
    movesEl.textContent = moves;
    positionTiles();
    checkSolved();
  }

  function checkSolved() {
    for (let i = 0; i < TOTAL; i++) {
      if (tiles[i] !== i) return;
    }
    // Solved!
    solved = true;
    boardWrap.classList.add('solved');
    // Small delay, then reveal
    setTimeout(() => {
      showReveal();
      launchConfetti();
    }, 600);
  }

  // Shuffle by making many valid random moves (guarantees solvability)
  function shuffle() {
    tiles = Array.from({ length: TOTAL }, (_, i) => i); // solved state
    const steps = 120;
    let lastMoved = -1;
    for (let s = 0; s < steps; s++) {
      const emptyPos = emptyPosition();
      const r = Math.floor(emptyPos / SIZE), c = emptyPos % SIZE;
      const neighbors = [];
      if (r > 0) neighbors.push(emptyPos - SIZE);
      if (r < SIZE - 1) neighbors.push(emptyPos + SIZE);
      if (c > 0) neighbors.push(emptyPos - 1);
      if (c < SIZE - 1) neighbors.push(emptyPos + 1);
      // Avoid immediate reversal
      const choices = neighbors.filter(n => n !== lastMoved);
      const pick = choices[Math.floor(Math.random() * choices.length)];
      lastMoved = emptyPos;
      [tiles[emptyPos], tiles[pick]] = [tiles[pick], tiles[emptyPos]];
    }
    // Safety: if accidentally solved, swap two non-empty tiles
    let allCorrect = true;
    for (let i = 0; i < TOTAL; i++) if (tiles[i] !== i) { allCorrect = false; break; }
    if (allCorrect) {
      [tiles[0], tiles[1]] = [tiles[1], tiles[0]];
    }
  }

  shuffleBtn.addEventListener('click', function() {
    if (solved) return;
    shuffle();
    moves = 0;
    movesEl.textContent = '0';
    positionTiles();
  });

  // Help button: appears after 2 minutes if unsolved
  const helpBtn = document.getElementById('helpBtn');
  const helpRow = document.getElementById('helpRow');
  setTimeout(function() {
    if (!solved) helpRow.classList.add('show');
  }, 120000);

  helpBtn.addEventListener('click', function() {
    if (solved) return;
    // Solve by setting all tiles to their correct positions
    tiles = Array.from({ length: TOTAL }, (_, i) => i);
    positionTiles();
    helpRow.classList.remove('show');
    // Trigger the same solved flow as a normal win
    solved = true;
    boardWrap.classList.add('solved');
    setTimeout(() => {
      showReveal();
      launchConfetti();
    }, 600);
  });

  function showReveal() {
    const area = document.getElementById('revealArea');
    area.classList.add('show');
    area.innerHTML = `
      <div class="reveal-step">
        <div class="reveal-big-emoji">🔥</div>
        <div class="reveal-title">Prispeli smo!</div>
        <p style="color:var(--gold-dark);margin-top:8px;font-size:14px">V ${moves} potezah</p>
      </div>
      <div class="reveal-card">
        <div class="reveal-photo-wrap">
          <img class="reveal-photo" src="picture/domacija.jpg" alt="Domačija Krnc"
               onerror="this.parentNode.innerHTML='<div style=&quot;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--gold-dark);font-size:12px;padding:20px;text-align:center;gap:8px;&quot;><div style=&quot;font-size:32px;opacity:0.5;&quot;>🏡</div><div>Slika <code style=&quot;color:var(--gold);font-size:11px;&quot;>picture/domacija.jpg</code> ni najdena</div></div>'">
        </div>
        <div class="reveal-name">Domačija Krnc</div>
        <div class="reveal-place">Hrib pri Hinjah</div>
        <div class="reveal-address">
          Hrib pri Hinjah 9, 8362 Hinje<br>
        </div>
        </div>        <div class="coords-line">📍 45.76735° N, 14.88889° E</div>
        <a href="https://www.google.com/maps?q=45.76735293323659,14.888893835273285" target="_blank" class="maps-btn">
          📍 Odpri v Google Maps
        </a>
      </div>
    `;
  }

  // Confetti (unified engine across all pages)
  function launchConfetti() {
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Colors tuned to this page's palette (gold/ember/cream)
    const colors = ['#C8A050','#F5D680','#D97740','#F5ECD7','#8B7340','#FFDA7A','#E8C44A','#6B3418'];
    const particles = [];

    for (let i = 0; i < 180; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        w: Math.random() * 10 + 4,
        h: Math.random() * 6 + 2,
        color: colors[Math.floor(Math.random() * colors.length)],
        vx: (Math.random() - 0.5) * 5,
        vy: Math.random() * 3 + 2,
        rot: Math.random() * 360,
        rotSpeed: (Math.random() - 0.5) * 12,
        opacity: 1,
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      particles.forEach(p => {
        if (p.opacity <= 0) return;
        alive = true;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.06;
        p.rot += p.rotSpeed;
        if (p.y > canvas.height + 30) p.opacity -= 0.015;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.globalAlpha = Math.max(0, p.opacity);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
      });
      if (alive) requestAnimationFrame(animate);
    }
    animate();
  }

  // Init
  createTiles();
  shuffle();
  positionTiles();
})();
</script>
