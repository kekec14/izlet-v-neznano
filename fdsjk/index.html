<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uganka</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0c0c0a;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: #c9a84c;
  }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem;
  }

  /* Logo - hidden by default */
  .logo-frame {
    width: 200px;
    height: 200px;
    display: none;
    align-items: center;
    justify-content: center;
    margin-bottom: 2rem;
    animation: fadeIn 0.8s ease-out;
  }

  .logo-frame.visible {
    display: flex;
  }

  /* Letter boxes */
  .letters {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
  }

  .letters input {
    width: 38px;
    height: 48px;
    text-align: center;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.5rem;
    font-weight: 400;
    color: #c9a84c;
    background: transparent;
    border: none;
    border-bottom: 2px solid rgba(201,168,76,0.4);
    outline: none;
    text-transform: uppercase;
    caret-color: #c9a84c;
    transition: border-color 0.3s;
  }

  .letters input:focus {
    border-bottom-color: #c9a84c;
  }

  .letters input.correct {
    border-bottom-color: #4a9e6a;
    color: #4a9e6a;
  }

  /* Tagline - hidden by default */
  .tagline {
    display: none;
    font-weight: 300;
    font-size: 0.85rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #b8a472;
    margin-bottom: 2.5rem;
    animation: fadeIn 0.8s ease-out;
  }

  .tagline.visible {
    display: block;
  }

  /* Hint */
  .hint {
    max-width: 440px;
    text-align: center;
    font-style: italic;
    font-weight: 300;
    font-size: 1.2rem;
    line-height: 1.9;
    color: #b8a472;
    margin-bottom: 2.5rem;
  }

  /* Button */
  .btn {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    color: #c9a84c;
    background: none;
    border: 1px solid rgba(201,168,76,0.4);
    padding: 0.7rem 2.5rem;
    border-radius: 2rem;
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0;
    visibility: hidden;
  }

  .btn:hover {
    background: rgba(201,168,76,0.1);
    border-color: #c9a84c;
  }

  .btn.show {
    opacity: 1;
    visibility: visible;
    animation: fadeIn 0.8s ease-out;
  }

  .btn.hidden { display: none; }

  /* Confetti canvas */
  #confetti {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9999;
  }

  /* Coordinates */
  .coords {
    display: none;
    text-align: center;
    margin-bottom: 1.5rem;
    animation: fadeIn 0.8s ease-out;
  }

  .coords.visible { display: block; }

  .coords p {
    font-size: 1.4rem;
    font-weight: 400;
    color: #c9a84c;
    letter-spacing: 0.05em;
  }

  /* Maps link */
  .maps-btn {
    display: none;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    color: #0c0c0a;
    background: #c9a84c;
    border: none;
    padding: 0.8rem 2.5rem;
    border-radius: 2rem;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.3s ease;
    animation: fadeIn 0.8s ease-out;
  }

  .maps-btn.visible { display: inline-block; }

  .maps-btn:hover {
    background: #b8a472;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  @media (max-width: 480px) {
    .letters { gap: 0.3rem; }
    .letters input { width: 30px; height: 40px; font-size: 1.2rem; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <!-- Logo (hidden until Pomoč click) -->
    <div class="logo-frame">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="180" height="180">
        <circle cx="100" cy="105" r="80" fill="none" stroke="#d6275a" stroke-width="18"/>
        <circle cx="100" cy="45" r="30" fill="#d6275a"/>
      </svg>
    </div>

    <!-- Letter input boxes: B E R R Y S H K A -->
    <div class="letters" id="letters"></div>

    <!-- Tagline (hidden until Pomoč click) -->
    <p class="tagline">The Ultimate Taste Experience</p>

    <!-- Hint (always visible) -->
    <p class="hint">Namig: iščemo skovanko, ki vsebuje besedo za jagodo — v njihovem primeru ima vodilno vlogo brinova jagoda.</p>

    <!-- Button (appears after 30s) -->
    <button class="btn" id="helpBtn">Pomoč</button>

    <!-- Coordinates (shown on solve) -->
    <div class="coords" id="coords">
      <p>45.74942° N, 15.03619° E</p>
    </div>

    <!-- Google Maps button (shown on solve) -->
    <a class="maps-btn" id="mapsBtn" href="https://www.google.com/maps?q=45.74942072203754,15.036189801476914" target="_blank">Odpri v Google Maps</a>
  </div>

  <canvas id="confetti"></canvas>

  <script>
    const ANSWER = 'BERRYSHKA';
    const container = document.getElementById('letters');
    const inputs = [];
    let solved = false;

    // Create input boxes
    for (let i = 0; i < ANSWER.length; i++) {
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.maxLength = 1;
      inp.setAttribute('autocomplete', 'off');
      inp.dataset.index = i;
      container.appendChild(inp);
      inputs.push(inp);
    }

    function checkSolved() {
      if (solved) return;
      const word = inputs.map(inp => inp.value.toUpperCase()).join('');
      if (word === ANSWER) {
        solved = true;
        inputs.forEach(inp => { inp.disabled = true; inp.classList.add('correct'); });
        document.getElementById('coords').classList.add('visible');
        document.getElementById('mapsBtn').classList.add('visible');
        document.getElementById('helpBtn').classList.add('hidden');
        launchConfetti();
      }
    }

    // Handle typing
    inputs.forEach((inp, i) => {
      inp.addEventListener('input', function() {
        const val = this.value.toUpperCase();
        this.value = val;

        if (val === ANSWER[i]) {
          this.classList.add('correct');
        } else {
          this.classList.remove('correct');
        }

        if (val && i < inputs.length - 1) {
          inputs[i + 1].focus();
        }

        checkSolved();
      });

      inp.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && !this.value && i > 0) {
          inputs[i - 1].focus();
          inputs[i - 1].value = '';
          inputs[i - 1].classList.remove('correct');
        }
      });
    });

    // Help button: show after 30s
    const helpBtn = document.getElementById('helpBtn');
    setTimeout(function() {
      if (!solved) helpBtn.classList.add('show');
    }, 30000);

    // Help button click
    helpBtn.addEventListener('click', function() {
      document.querySelector('.logo-frame').classList.add('visible');
      document.querySelector('.tagline').classList.add('visible');
      this.classList.add('hidden');
    });

    // Confetti
    function launchConfetti() {
      const canvas = document.getElementById('confetti');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const pieces = [];
      const colors = ['#c9a84c', '#d6275a', '#4a9e6a', '#b8a472', '#e4d5a0', '#ff6b8a', '#ffd700'];

      for (let i = 0; i < 150; i++) {
        pieces.push({
          x: Math.random() * canvas.width,
          y: Math.random() * -canvas.height,
          w: Math.random() * 10 + 5,
          h: Math.random() * 6 + 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          vy: Math.random() * 3 + 2,
          vx: (Math.random() - 0.5) * 2,
          rot: Math.random() * 360,
          rv: (Math.random() - 0.5) * 8
        });
      }

      let frame = 0;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let alive = false;

        pieces.forEach(p => {
          if (p.y < canvas.height + 50) alive = true;
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.04;
          p.rot += p.rv;

          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot * Math.PI / 180);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
          ctx.restore();
        });

        frame++;
        if (alive && frame < 300) {
          requestAnimationFrame(draw);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
      }
      draw();
    }
  </script>
</body>
</html>
